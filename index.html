<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights With Raian</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        #main-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #764ba2;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        #game-container {
            min-height: 300px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            border-left: 5px solid #764ba2;
        }
        #game-container p {
            line-height: 1.6;
            margin: 10px 0;
            font-size: 1.1em;
        }
        button {
            background-color: #667eea;
            color: white;
            padding: 12px 24px;
            margin: 8px 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #764ba2;
        }
        #start-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 18px;
        }
        #choice-buttons {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <h1>Five Nights With Raian</h1>
        <div id="game-container">
            <p>Welcome to the game! Click Start to begin your survival adventure.</p>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
